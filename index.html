<body class="bg-gray-100 dark:bg-gray-900 overflow-hidden font-sans text-gray-800 dark:text-gray-100">

        <h1 class="text-white text-3xl font-black mb-2">Loocator</h1>

            <span data-i18n="splashLoading"></span>

    </div>

    <button id="btn-open-menu" class="hidden absolute top-4 left-4 bg-white dark:bg-gray-800 text-blue-600 dark:text-blue-400 p-3 rounded-full shadow-xl ui-layer active:scale-95 active:-rotate-12 transition-all duration-200 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
    </button>

    <div id="main-menu" class="absolute top-4 left-4 right-4 max-h-[85vh] overflow-y-auto bg-white dark:bg-gray-800 p-5 rounded-3xl shadow-2xl ui-layer z-[1000] flex flex-col gap-4 transition-all duration-300">
        
        <!-- Header: Titel & Buttons -->
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-black text-blue-600 dark:text-blue-400 tracking-tight">Loocator</h1>
                <p class="text-[11px] text-gray-500 dark:text-gray-400 mt-0.5 font-bold uppercase tracking-widest" data-i18n="appDesc"></p>
            </div>
            
            <div class="flex items-center gap-3">
                <!-- NEU: Eleganter Theme-Switcher -->
                <div class="flex items-center bg-gray-100 dark:bg-gray-700 p-1 rounded-full shadow-inner border border-gray-200 dark:border-gray-600">
                    <button id="btn-theme-light" class="p-1.5 rounded-full transition-all duration-300 flex items-center justify-center w-8 h-8" title="Hell">

                    </button>
                    <button id="btn-theme-dark" class="p-1.5 rounded-full transition-all duration-300 flex items-center justify-center w-8 h-8" title="Dunkel">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4"><path fill-rule="evenodd" d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" clip-rule="evenodd" /></svg>

            </div>
        </div>

        <!-- Moderne Suche -->
        <div class="relative flex flex-col">
            <form id="search-form" class="relative">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <img src="img/search.svg" alt="Search" class="w-4 h-4 opacity-40 dark:invert">
                </div>
                <input type="text" id="search-input" data-i18n-placeholder="searchPlaceholder" class="w-full bg-gray-100 dark:bg-gray-700 dark:text-white border-transparent focus:bg-white focus:border-blue-500 focus:ring-2 focus:ring-blue-200 dark:focus:ring-blue-800 rounded-2xl py-3 pl-10 pr-4 text-sm font-medium transition-all outline-none" autocomplete="off">
            </form>
            <ul id="search-suggestions" class="hidden absolute top-full left-0 w-full bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 shadow-xl rounded-2xl mt-2 max-h-48 overflow-y-auto z-50 text-sm"></ul>
        </div>

        <!-- Moderne Filter-Chips (Die Checkboxen sind unsichtbar im Hintergrund) -->
        <div class="flex flex-wrap gap-2 pt-1">
            <label class="cursor-pointer">
                <input type="checkbox" id="filter-public" class="peer sr-only" checked>
                <div class="px-3.5 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold transition-all peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 dark:peer-checked:bg-blue-500 shadow-sm">
                    <span data-i18n="filterPublic"></span>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="checkbox" id="filter-eurokey" class="peer sr-only" checked>
                <div class="px-3.5 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold transition-all peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 dark:peer-checked:bg-blue-500 shadow-sm">
                    <span data-i18n="filterEurokey"></span>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="checkbox" id="filter-free" class="peer sr-only">
                <div class="px-3.5 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold transition-all peer-checked:bg-teal-500 peer-checked:text-white peer-checked:border-teal-500 shadow-sm">
                    <span data-i18n="filterFree"></span>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="checkbox" id="filter-changing" class="peer sr-only">
                <div class="px-3.5 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold transition-all peer-checked:bg-purple-500 peer-checked:text-white peer-checked:border-purple-500 shadow-sm">
                    <span data-i18n="filterChanging"></span>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="checkbox" id="filter-open" class="peer sr-only">
                <div class="px-3.5 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold transition-all peer-checked:bg-green-600 peer-checked:text-white peer-checked:border-green-600 shadow-sm">
                    <span data-i18n="filterOpen"></span>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="checkbox" id="filter-success" class="peer sr-only">
                <div class="px-3.5 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold transition-all peer-checked:bg-yellow-500 peer-checked:text-white peer-checked:border-yellow-500 shadow-sm">
                    <span data-i18n="filterSuccess"></span>
                </div>
            </label>
            <label class="cursor-pointer">
                <input type="checkbox" id="filter-nobad" class="peer sr-only">
                <div class="px-3.5 py-2 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold transition-all peer-checked:bg-orange-500 peer-checked:text-white peer-checked:border-orange-500 shadow-sm">
                    <span data-i18n="filterNoBad"></span>
                </div>
            </label>
            <label class="cursor-pointer mt-2 w-full">
                <input type="checkbox" id="filter-favorites" class="peer sr-only">
                <div class="px-4 py-2.5 rounded-xl border-2 border-red-100 dark:border-red-900/30 bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 text-xs font-bold transition-all peer-checked:bg-red-500 peer-checked:text-white peer-checked:border-red-500 shadow-sm flex items-center justify-center">
                    <span data-i18n="filterFav"></span>
                </div>
            </label>
        </div>

        <!-- PWA Install Area -->
        <button id="btn-install" data-i18n="btnInstall" class="hidden mt-1 bg-green-500 text-white px-4 py-3 rounded-xl text-sm font-bold active:bg-green-700 transition-colors shadow-md flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            <span data-i18n="btnInstall"></span>
        </button>
        
        <div id="ios-install-hint" class="hidden mt-1 bg-blue-50 dark:bg-gray-700 p-3 rounded-xl text-xs border border-blue-200 dark:border-gray-600 text-blue-800 dark:text-blue-200">
            <span class="font-bold" data-i18n="iosHintTitle"></span><br>
            <span data-i18n="iosHintBody"></span>
        </div>

        <!-- Action Buttons (Melden & Kontakt) -->
        <div class="flex gap-2 mt-1">
            <button id="btn-report" class="flex-1 bg-red-50 dark:bg-red-900/30 text-red-700 dark:text-red-300 px-2 py-2.5 rounded-xl text-sm font-bold text-center active:scale-95 transition-transform border border-red-200 dark:border-red-800 shadow-sm">
                <span data-i18n="btnReport"></span>
            </button>
            <button id="btn-contact" class="flex-1 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 px-2 py-2.5 rounded-xl text-sm font-bold text-center active:scale-95 transition-transform border border-blue-200 dark:border-blue-800 shadow-sm">
                <span data-i18n="btnContact"></span>
            </button>
        </div>

        <!-- Footer / Support -->
        <div class="mt-1 flex flex-col gap-1.5">
            <p data-i18n="SupportMe" class="text-[11px] text-center text-gray-500 dark:text-gray-400 px-1 leading-snug"></p>
            <a href="https://ko-fi.com/loocator" target="_blank" rel="noopener noreferrer" class="bg-orange-100 dark:bg-orange-900 text-orange-700 dark:text-orange-300 px-4 py-2.5 rounded-xl text-sm font-bold text-center active:scale-95 transition-transform flex items-center justify-center gap-2 border border-orange-200 dark:border-orange-800 shadow-sm">
                <span data-i18n="btnSupport"></span>
            </a>
        </div>

        <div class="mt-1 text-center flex flex-col gap-1.5">
            <div id="app-stats" class="text-[11px] text-gray-500 dark:text-gray-400 font-medium bg-gray-50 dark:bg-gray-700 py-1.5 rounded-lg border border-gray-100 dark:border-gray-600 hidden"></div>
            <a class="text-[10px] text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors leading-tight">
                <span class="mt-0.5 inline-block">Made with ❤️ in Rheinstetten</span>
            </a>
        </div>
    </div>

    <div id="loading-spinner" class="hidden absolute top-4 right-4 bg-white dark:bg-gray-800 p-2 rounded-full shadow-lg ui-layer">
        <div class="animate-spin text-2xl inline-block">🚽</div>
    </div>

    <!-- Layer Toggle (angehoben auf bottom-28) -->
    <button id="btn-layer-toggle" class="absolute bottom-28 right-4 bg-white text-gray-600 dark:bg-gray-800 dark:text-gray-300 p-3 rounded-full shadow-xl ui-layer transition-all active:scale-95 border border-gray-200 dark:border-gray-600 flex items-center justify-center">
        <img src="img/map.svg" alt="Map" class="w-6 h-6 dark:invert">
    </button>

    <!-- Location Button (angehoben auf bottom-10) -->
    <button id="btn-location" class="absolute bottom-10 right-4 bg-white text-gray-600 dark:bg-gray-800 dark:text-blue-400 p-3 rounded-full shadow-xl ui-layer transition-all active:scale-95 border border-gray-200 dark:border-gray-600 flex items-center justify-center">
        <img src="img/map-tag.svg" alt="Location" class="w-7 h-7">
    </button>

    <div id="map"></div>

    <div id="bottom-sheet" class="bottom-sheet fixed bottom-0 left-0 w-full bg-white dark:bg-gray-800 rounded-t-3xl shadow-[0_-5px_25px_rgba(0,0,0,0.3)] p-6 transform translate-y-full max-h-[85vh] flex flex-col transition-transform duration-300 touch-pan-y">
        <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-4 cursor-pointer" id="btn-close-sheet"></div>
        
        <div class="flex justify-between items-start mb-1">
            <h2 id="sheet-title" class="text-2xl font-bold"></h2>
            <button id="btn-fav" class="text-3xl active:scale-90 transition-transform pl-4">🤍</button>
        </div>
        
        <div id="routing-warning" class="hidden bg-red-100 dark:bg-red-900 border border-red-300 dark:border-red-700 text-red-700 dark:text-red-300 text-xs font-bold p-2 rounded-xl mb-2 mt-1" data-i18n="routeWarning"></div>

        <p id="sheet-distance" class="text-sm font-bold text-blue-600 dark:text-blue-400 mb-2"></p>
        <h3 id="sheet-subtitle" class="text-md font-semibold text-gray-700 dark:text-gray-300 mb-1 hidden"></h3>
        <p id="sheet-address" class="text-sm font-medium text-gray-600 dark:text-gray-300 mb-2 hidden"></p>
        
        <p id="sheet-note" class="text-sm italic text-gray-600 dark:text-gray-300 mb-3 bg-blue-50 dark:bg-gray-700 p-2 rounded-lg border-l-4 border-blue-400 hidden"></p>
        
        <p id="sheet-info" class="text-sm text-gray-500 dark:text-gray-400 mb-5 leading-relaxed"></p>

        <div id="feedback-section" class="bg-gray-50 dark:bg-gray-700 rounded-2xl p-5 mb-5 border border-gray-100 dark:border-gray-600 shadow-inner transition-opacity duration-300">
            <h3 class="font-bold mb-3" data-i18n="howWasIt"></h3>
            
            <div class="mb-5">
                <span class="text-sm block mb-2 font-medium" data-i18n="couldYouUse"></span>
                <div class="flex gap-3">
                    <button id="btn-usable-yes" data-i18n="btnYes" class="flex-1 bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300 py-3 rounded-xl font-bold transition-opacity"></button>
                    <button id="btn-usable-no" data-i18n="btnNo" class="flex-1 bg-red-100 dark:bg-red-900 text-red-700 dark:text-red-300 py-3 rounded-xl font-bold transition-opacity"></button>
                </div>
                <div id="stat-usable" class="text-xs mt-2 text-gray-500 dark:text-gray-400 font-medium"></div>
            </div>

            <div>
                <span class="text-sm block mb-2 font-medium" data-i18n="cleanliness"></span>
                <div class="flex gap-2" id="star-rating">
                    <button class="btn-star active:scale-90 transition-transform" data-val="1">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-yellow-400 drop-shadow-sm pointer-events-none"><path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" /></svg>
                    </button>
                    <button class="btn-star active:scale-90 transition-transform" data-val="2">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-yellow-400 drop-shadow-sm pointer-events-none"><path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" /></svg>
                    </button>
                    <button class="btn-star active:scale-90 transition-transform" data-val="3">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-yellow-400 drop-shadow-sm pointer-events-none"><path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" /></svg>
                    </button>
                    <button class="btn-star active:scale-90 transition-transform" data-val="4">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-yellow-400 drop-shadow-sm pointer-events-none"><path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" /></svg>
                    </button>
                    <button class="btn-star active:scale-90 transition-transform" data-val="5">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-yellow-400 drop-shadow-sm pointer-events-none"><path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" /></svg>
                    </button>
                </div>
                
                <div id="stat-clean" class="text-xs mt-2 text-gray-500 dark:text-gray-400 font-medium"></div>
            </div>

            <div class="mt-5 pt-4 border-t border-gray-200 dark:border-gray-600 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span id="karma-emoji" class="text-2xl drop-shadow-sm">🧻</span>
                    <div class="flex flex-col leading-tight">
                        <span class="text-[9px] text-gray-400 font-bold uppercase tracking-wider" data-i18n="yourRank"></span>
                        <span id="karma-title" class="text-xs font-bold text-gray-700 dark:text-gray-200"></span>
                    </div>
                </div>
                <div class="text-right leading-tight">
                    <span id="karma-points" class="text-[10px] text-gray-500 block"></span>

                    <span id="karma-left" class="text-[10px] font-bold text-indigo-600"></span>
                </div>
            </div>
        </div>

        <!-- NEUES KOMPAKTES BUTTON LAYOUT -->
        <div class="flex gap-2 pb-4 pt-2">
            <!-- Navigieren (3/6) -->
            <button id="btn-navigate" class="flex-[3] bg-blue-600 text-white font-bold py-3.5 rounded-2xl text-base active:bg-blue-800 transition-colors shadow-lg flex items-center justify-center gap-2">
                <img src="img/route.svg" alt="" class="w-5 h-5 filter brightness-0 invert">
                <span data-i18n="btnNav"></span>
            </button>
            
            <!-- Teilen (2/6) -->
            <button id="btn-share" class="flex-[2] bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-100 font-bold py-3.5 rounded-2xl text-base active:bg-gray-200 dark:active:bg-gray-600 transition-colors shadow-sm flex items-center justify-center gap-2 border border-gray-200 dark:border-gray-600">
                <img src="img/share.svg" alt="" class="w-5 h-5 dark:invert">
                <span data-i18n="btnShare"></span>
            </button>

            <!-- Melden (1/6 - Nur Icon) -->
            <button id="btn-report-existing" class="flex-[1] bg-red-50 dark:bg-red-900/20 py-3.5 rounded-2xl active:bg-red-100 dark:active:bg-red-900/40 transition-colors shadow-sm flex items-center justify-center border border-red-100 dark:border-red-900/50" title="Fehler melden">
                <img src="img/report.svg" alt="Melden" class="w-[22px] h-[22px]" style="filter: invert(30%) sepia(80%) saturate(3000%) hue-rotate(345deg) brightness(95%) contrast(100%);">
            </button>
        </div>

    </div>

    <!-- Fadenkreuz in der Bildschirmmitte (Standardmäßig unsichtbar) -->
    <div id="crosshair" class="hidden fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none z-[400] text-5xl drop-shadow-md pb-8">
        📍
    </div>

    <!-- NEU: Die Ziel-Modus Leiste unten -->
    <div id="target-bottom-bar" class="hidden fixed bottom-0 left-0 w-full bg-white dark:bg-gray-800 p-5 shadow-[0_-10px_40px_rgba(0,0,0,0.3)] z-[500] flex flex-col items-center rounded-t-3xl">
        <p class="text-sm font-bold text-gray-700 dark:text-gray-200 mb-4 text-center" data-i18n="reportModeInfo"></p>
        <div class="flex gap-3 w-full max-w-sm">
            <button id="btn-cancel-target" class="flex-1 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 font-bold py-3.5 rounded-xl active:scale-95 transition-transform" data-i18n="reportCancel"></button>
            <button id="btn-confirm-target" class="flex-[2] bg-blue-600 text-white font-bold py-3.5 rounded-xl active:scale-95 transition-transform shadow-lg" data-i18n="reportConfirmLoc"></button>
        </div>
    </div>

    <!-- Das Melde-Formular Modal (mit dynamischem Text) -->
    <div id="report-modal" class="hidden fixed inset-0 bg-gray-900/80 z-[9000] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 max-w-sm w-full shadow-2xl">
            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-col">
                    <h2 class="text-xl font-black text-blue-600 dark:text-blue-400" data-i18n="reportModalTitle"></h2>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1 leading-tight pr-2" data-i18n="reportExistingHint" id="modal-report-hint" style="display: none;"></p>
                </div>
                <button id="btn-close-report" class="text-gray-400 hover:text-gray-600 text-xl font-bold p-1">✕</button>
            </div>
            
            <div class="flex flex-col gap-3 mb-4">
                <label id="label-rep-1" class="flex items-center gap-3 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl border border-gray-200 dark:border-gray-600 cursor-pointer">
                    <input type="radio" name="report-type" id="radio-rep-1" value="Missing public toilet" class="w-5 h-5 accent-blue-600" checked>
                    <span class="text-sm font-medium" data-i18n="reportType1"></span>
                </label>
                <label id="label-rep-2" class="flex items-center gap-3 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl border border-gray-200 dark:border-gray-600 cursor-pointer">
                    <input type="radio" name="report-type" id="radio-rep-2" value="Missing Eurokey-WC" class="w-5 h-5 accent-blue-600">
                    <span class="text-sm font-medium" data-i18n="reportType2"></span>
                </label>
                <label id="label-rep-3" class="flex items-center gap-3 bg-gray-50 dark:bg-gray-700 p-3 rounded-xl border border-gray-200 dark:border-gray-600 cursor-pointer">
                    <input type="radio" name="report-type" id="radio-rep-3" value="Incorrect / Doesn't exist" class="w-5 h-5 accent-blue-600">
                    <span class="text-sm font-medium" data-i18n="reportType3"></span>
                </label>
            </div>

            <textarea id="report-note" class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-3 text-sm mb-5 focus:outline-none focus:border-blue-500" rows="3" data-i18n-placeholder="reportNotePlaceholder"></textarea>

            <button id="btn-submit-report" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg" data-i18n="reportSubmit"></button>
        </div>
    </div>

    <div id="tutorial-modal" class="hidden fixed inset-0 bg-gray-900/80 z-[9000] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 max-w-sm w-full shadow-2xl">
            <h2 class="text-2xl font-black text-blue-600 dark:text-blue-400 mb-2" data-i18n="tutWelcome"></h2>
            <p class="text-sm text-gray-600 dark:text-gray-300 mb-5" data-i18n="tutIntro"></p>
            
            <div class="bg-blue-50 dark:bg-blue-900/30 border border-blue-200 dark:border-blue-800 p-3 rounded-xl mb-6 flex gap-3 items-start">
                <div class="shrink-0 mt-0.5"> <img src="img/map-tag.svg" alt="Location" class="w-5 h-5 [filter:brightness(0)]"> </div>
                    <p class="text-sm text-blue-800 dark:text-blue-200 font-medium mt-0.5" data-i18n="tutLocation"></p>
            </div>

            <div class="flex flex-col gap-3 mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-yellow-300 dark:bg-yellow-600 border-2 border-yellow-500 flex items-center justify-center shadow-sm">🔑</div>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200" data-i18n="tutEuro"></span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-white dark:bg-gray-600 border border-gray-200 dark:border-gray-500 flex items-center justify-center shadow-sm relative">
                        🚽<div class="absolute -top-1 -left-1 w-3.5 h-3.5 bg-yellow-400 rounded-full border-2 border-white dark:border-gray-800"></div>
                    </div>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200" data-i18n="tutTop"></span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-white dark:bg-gray-600 border border-gray-200 dark:border-gray-500 flex items-center justify-center shadow-sm relative">
                        🚽<div class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-white dark:border-gray-800"></div>
                    </div>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200" data-i18n="tut247"></span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-white dark:bg-gray-600 border border-gray-200 dark:border-gray-500 flex items-center justify-center shadow-sm relative">
                        🚽<div class="absolute -bottom-1 -right-1 w-3 h-3 bg-purple-500 rounded-full border-2 border-white dark:border-gray-800"></div>
                    </div>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200" data-i18n="tutChanging"></span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-white dark:bg-gray-600 border border-gray-200 dark:border-gray-500 flex items-center justify-center shadow-sm relative">
                        🚽<div class="absolute -bottom-1 -left-1 w-3 h-3 bg-red-600 rounded-full border-2 border-white dark:border-gray-800"></div>
                    </div>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200" data-i18n="tutDefect"></span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-white dark:bg-gray-600 border border-gray-200 dark:border-gray-500 flex items-center justify-center shadow-sm text-lg">❤️</div>
                    <span class="text-sm font-medium text-gray-700 dark:text-gray-200" data-i18n="tutFav"></span>
                </div>
            </div>

            <button id="btn-close-tutorial" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg" data-i18n="tutStart"></button>
        </div>
    </div>

    <div id="contact-modal" class="hidden fixed inset-0 bg-gray-900/80 z-[9000] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 max-w-sm w-full shadow-2xl">
            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-col">
                   <h2 class="text-xl font-black text-blue-600 dark:text-blue-400" data-i18n="contactModalTitle"></h2>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 leading-tight pr-2" data-i18n="contactModalText"></p>
                </div>
             <button id="btn-close-contact" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl font-bold p-1">✕</button>
            </div>

            <form id="contact-form" class="flex flex-col gap-3">
                <input type="hidden" name="access_key" value="378c3cbc-7276-47d4-b2a8-a6d08d33f6e5">
                <input type="hidden" name="subject" value="Loocator Kontaktformular">
                <input type="hidden" name="from_name" value="Loocator">
                <input type="checkbox" name="botcheck" class="hidden" tabindex="-1" autocomplete="off">

                <input
                    id="contact-name"
                    type="text"
                    name="name"
                    data-i18n-placeholder="contactNamePlaceholder"
                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500"
                    required
                >

                <input
                    id="contact-email"
                    type="email"
                    name="email"
                    data-i18n-placeholder="contactEmailPlaceholder"
                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500"
                    required
                >

                <textarea
                    id="contact-message"
                    name="message"
                    rows="4"
                    data-i18n-placeholder="contactMessagePlaceholder"
                    class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500"
                    required
                ></textarea>

                <button
                    id="btn-submit-contact"
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3.5 rounded-xl transition-colors shadow-lg"
                    data-i18n="contactSubmit"
                ></button>

                <button
                    id="btn-close-contact-secondary"
                    type="button"
                    class="w-full bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-100 font-bold py-3 rounded-xl active:bg-gray-200 dark:active:bg-gray-600 transition-colors border border-gray-200 dark:border-gray-600"
                    data-i18n="contactClose"
                ></button>
            </form>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 z-60 pointer-events-none w-11/12 max-w-sm"></div>

    <script src="translations.js"></script>
    <script src="app.js"></script>
</body>
</html>
